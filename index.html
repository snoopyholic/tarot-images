<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잉크의위로 타로 리딩 서비스</title>
  <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #1e0d14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      background: #2a0d18;
      border: 1px solid #4a1a2a;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .brand {
      color: #d4af6a;
      font-size: 10px;
      letter-spacing: 6px;
      margin-bottom: 12px;
    }
    h1 {
      color: #f5e6d0;
      font-size: 26px;
      letter-spacing: 5px;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #9a6a5a;
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 40px;
    }
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af6a, transparent);
      margin: 0 auto 36px;
    }
    .product-box {
      background: #1e0d14;
      border: 1px solid #3a1020;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .product-name {
      color: #f5f0e8;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .product-desc {
      color: #9a6a5a;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .product-price {
      color: #d4af6a;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .notice {
      color: #7a4a5a;
      font-size: 11px;
      line-height: 1.8;
      margin-bottom: 28px;
    }
    .pay-btn {
      background: linear-gradient(135deg, #8a2a3a, #6a1a2a);
      color: #f5e6d0;
      border: 1px solid #d4af6a;
      border-radius: 6px;
      padding: 16px 40px;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .pay-btn:hover { opacity: 0.85; }
    .footer {
      margin-top: 28px;
      color: #5a3a4a;
      font-size: 10px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="brand">✦ TAROT READING ✦</div>
  <h1>잉크의위로</h1>
  <div class="subtitle">INK'S COMFORT</div>
  <div class="divider"></div>

  <div class="product-box">
    <div class="product-name">1:1 맞춤 타로 리딩</div>
    <div class="product-desc">
      켈틱 크로스 10장 스프레딩<br>
      개인화 리딩 리포트 · 이메일 발송<br>
      결제 완료 후 48시간 이내
    </div>
    <div class="product-price">10,000원</div>
  </div>

  <div class="notice">
    결제 완료 후 신청하신 이메일로 리딩 리포트가 발송됩니다.<br>
    이메일 오기입으로 인한 미수신은 환불이 불가합니다.
  </div>

  <button class="pay-btn" onclick="requestPay()">결제하기</button>

  <div class="footer">
    본 서비스는 자기 성찰과 영적 탐구 목적으로 제공됩니다.<br>
    문의: ssstorystorageee@gmail.com
  </div>
</div>

<script>
  IMP.init("imp84021428");

  function requestPay() {
    IMP.request_pay({
      channel_key: "channel-key-21d4fb19-78c2-401e-a92c-48ea72be865e",
      pay_method: "card",
      merchant_uid: "order_" + new Date().getTime(),
      name: "잉크의위로 1:1 타로 리딩",
      amount: 10000,
      buyer_email: "",
      buyer_name: "",
      buyer_tel: "",
    }, function(rsp) {
      if (rsp.success) {
        alert("결제가 완료되었습니다.\n리딩 리포트가 신청하신 이메일로 발송됩니다.");
      } else {
        alert("결제에 실패하였습니다.\n" + rsp.error_msg);
      }
    });
  }
</script>
</body>
</html>
